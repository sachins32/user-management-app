spring.datasource.url = jdbc:mysql://localhost:3306/users
spring.datasource.username = root
spring.datasource.password = password
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
# driver-class-name can be  omitted; Spring Boot handles it.
#In modern Spring Boot (2.0+), the driver-class-name is technically optional.
#Spring Boot has a feature called Driver Detection. When you provide the spring.datasource.url, Spring Boot looks at the prefix (e.g., jdbc:mysql: or jdbc:postgresql:) and automatically matches it to the correct driver class on your classpath.

# Explicitly defining the dialect prevents "guessing" errors
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

